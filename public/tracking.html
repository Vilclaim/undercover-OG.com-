<!DOCTYPE html>
<html>
<head>
<title>Track Order - UNDERCOVER-OG</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial,sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.container{
width:90%;
max-width:500px;
background:#1c1c1c;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:gold;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#222;
border-radius:10px;
display:none;
}

.status{
font-size:20px;
font-weight:bold;
color:gold;
}

.customer-box{
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.product-box{
display:flex;
align-items:center;
gap:15px;
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.product-image{
width:80px;
height:80px;
object-fit:cover;
border-radius:12px;
border:2px solid gold;
}

.tracking-box{
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

</style>

</head>
<body>

<div class="container">

<h1>📦 Track Your Order</h1>

<input
type="text"
id="trackingNumber"
placeholder="Enter Tracking Number">

<button onclick="trackOrder()">
Track Order
</button>

<div class="result" id="result">

<div class="customer-box">
<h3 id="customerName"></h3>
</div>

<div class="product-box">

<img
id="productImage"
class="product-image"
src="">

<div>
<h3 id="productName"></h3>

<p>
Qty:
<span id="productQty"></span>
</p>

</div>

</div>

<div class="tracking-box">

<p>📦 Tracking Number</p>

<h3 id="trackNo"></h3>

</div>

<div class="tracking-box">

<p>Status</p>

<h2
class="status"
id="status">
</h2>

</div>

<div class="tracking-box">

<p>💳 Payment Status</p>

<h3 id="paymentStatus"></h3>

</div>

<div class="tracking-box">

<p>💰 Total Amount</p>

<h3>AED <span id="totalAmount"></span></h3>

</div>

</div>

</div>

<script>

async function trackOrder(){

const trackingNumber =
document.getElementById(
"trackingNumber"
).value;

if(!trackingNumber){

alert("Enter tracking number");

return;

}

try{

const response =
await fetch(
`/api/track/${trackingNumber}`
);

const data =
await response.json();

if(!data.success){

alert("Tracking number not found");

return;

}

document.getElementById(
"result"
).style.display =
"block";

document.getElementById(
"trackNo"
).innerText =
data.order.trackingNumber;

document.getElementById(
"status"
).innerText =
data.order.status;

document.getElementById(
"paymentStatus"
).innerText =
data.order.paymentStatus || "Pending";

document.getElementById(
"totalAmount"
).innerText =
data.order.total || 0;

document.getElementById(
"customerName"
).innerText =
data.order.customerName || "Customer";

document.getElementById(
"productImage"
).src =
data.order.items?.[0]?.image ||
"/uploads/default-product.png";

document.getElementById(
"productName"
).innerText =
data.order.items?.[0]?.name ||
"Product";

document.getElementById(
"productQty"
).innerText =
data.order.items?.[0]?.qty ||
1;

}catch(err){

console.log(err);

alert("Error tracking order");

}

}

</script>

</body>
</html>
