
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#00d4a355,transparent 30%),
radial-gradient(circle at bottom right,#00d4a322,transparent 30%),
linear-gradient(135deg,#03130e,#071b14,#0b251d);

overflow:hidden;
position:relative;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#00d4a315;
border-radius:50%;
top:-200px;
left:-150px;
filter:blur(120px);
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:#00d4a310;
border-radius:50%;
bottom:-200px;
right:-150px;
filter:blur(120px);
}

.login-card{

width:460px;
padding:45px;

border-radius:30px;

background:
rgba(8,20,16,.85);

backdrop-filter:blur(25px);

border:
1px solid rgba(0,212,163,.15);

box-shadow:
0 25px 80px rgba(0,0,0,.55);

position:relative;
z-index:2;

}

.logo{

text-align:center;

font-size:42px;

font-weight:800;

color:#00d4a3;

letter-spacing:1px;

margin-bottom:8px;

text-transform:uppercase;

}

.subtitle{

text-align:center;

color:#8ba39b;

font-size:15px;

margin-bottom:35px;

}

.input-group input{

width:100%;

padding:16px;

border-radius:16px;

border:1px solid rgba(255,255,255,.08);

background:
rgba(255,255,255,.04);

color:white;

transition:.3s;

}

.input-group input:focus{

border-color:#00d4a3;

box-shadow:
0 0 15px rgba(0,212,163,.25);

}

.login-btn{

width:100%;

padding:16px;

border:none;

border-radius:16px;

background:
linear-gradient(
135deg,
#00d4a3,
#00b387
);

color:#fff;

font-size:17px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

transform:translateY(-3px);

box-shadow:
0 10px 25px rgba(0,212,163,.3);

}

.security-text{

margin-top:18px;

text-align:center;

color:#6f8c82;

font-size:13px;

}


</style>
</head>

<body>

<div class="login-card">

<div class="logo">
 Admin Panel
</div>

<div class="subtitle">
Secure Administrator Access
</div>

<form id="adminLoginForm">

<div class="input-group">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter admin email"
required
>
</div>

<div class="input-group">
<label>Password</label>
<input
type="password"
id="password"
placeholder="Enter password"
required
>
</div>

<button
type="submit"
class="login-btn"
id="loginBtn"
>
Login as Admin
</button>

<div class="security-text">
🔒 Protected by JWT Authentication
</div>

<div
id="error"
class="error"
></div>

</form>

</div>

<script>

document
.getElementById("adminLoginForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const loginBtn =
document.getElementById("loginBtn");

loginBtn.disabled = true;
loginBtn.textContent = "Signing In...";

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const error =
document.getElementById("error");

error.textContent = "";

try{

const response =
await fetch("/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data =
await response.json();



if(!response.ok){

 loginBtn.disabled = false;
loginBtn.textContent = "Login as Admin";   

error.textContent =
data.message || "Login failed";

return;

}

if(data.user.role !== "admin"){

loginBtn.disabled = false;
loginBtn.textContent = "Login as Admin";

error.textContent =
"Admin account required";

return;

}

localStorage.setItem(
"adminToken",
data.token
);

localStorage.setItem(
"adminUser",
JSON.stringify(data.user)
);

loginBtn.disabled = false;
loginBtn.textContent = "Login as Admin";

window.location.href =
"/admin.html";



}catch(err){

console.log(err);

loginBtn.disabled = false;
loginBtn.textContent = "Login as Admin";

error.textContent =
"Server error";

}

});

</script>

</body>
</html>
