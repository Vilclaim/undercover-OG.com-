
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Management</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top left,#0f2d22,#07120d 50%);
color:white;
display:flex;
min-height:100vh;
overflow-x:hidden;
}

.sidebar{
width:260px;
background:#0d1f18;
padding:25px;
border-right:1px solid rgba(255,255,255,.08);
position:fixed;
left:0;
top:0;
height:100vh;
}

.logo{
font-size:30px;
font-weight:800;
color:#00c896;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu button{
background:rgba(255,255,255,.05);
border:none;
color:white;
padding:14px;
border-radius:14px;
cursor:pointer;
font-weight:600;
display:flex;
align-items:center;
gap:12px;
transition:.3s;
}

.menu button:hover,
.menu button.active{
background:linear-gradient(
90deg,
#00c896,
#00e0aa
);
color:#04110d;
}

.main{
flex:1;
margin-left:260px;
padding:30px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
padding:22px;
background:rgba(255,255,255,.04);
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,.04);
padding:25px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.card h2{
font-size:34px;
color:#00c896;
margin-top:10px;
}

.table-card{
background:rgba(255,255,255,.04);
padding:25px;
border-radius:24px;
border:1px solid rgba(255,255,255,.08);
}

.orders-modern-table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.orders-modern-table th{
padding:16px;
text-align:left;
opacity:.7;
border-bottom:1px solid rgba(255,255,255,.08);
}

.orders-modern-table td{
padding:18px 16px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.orders-modern-table tr:hover{
background:rgba(255,255,255,.03);
}

.search-box{
padding:14px;
border:none;
outline:none;
border-radius:14px;
background:#10241c;
color:white;
width:320px;
}

.profile-img{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
border:2px solid #00c896;
}

.role-badge{
padding:7px 14px;
border-radius:999px;
font-size:12px;
font-weight:700;
display:inline-block;
}

.role-admin{
background:#00c896;
color:#04110d;
}

.role-user{
background:rgba(255,255,255,.08);
color:white;
}

.delete-btn{
background:#ff4d4d;
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:700;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
TRENDSETTLE
</div>

<div class="menu">

<button onclick="window.location.href='admin.html'">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</button>

<button class="active">
<i class="fa-solid fa-users"></i>
Users
</button>

</div>

</div>

<div class="main">

<div class="topbar">

<div>

<h1 style="font-size:40px;">
Users Management
</h1>

<p style="opacity:.7;margin-top:6px;">
Manage registered customer accounts
</p>

</div>

<input
type="text"
id="searchUsers"
class="search-box"
placeholder="Search users..."
>

</div>

<div class="cards">

<div class="card">

<p>Total Users</p>

<h2 id="totalUsers">
0
</h2>

</div>

<div class="card">

<p>Admin Accounts</p>

<h2 id="adminUsers">
0
</h2>

</div>

<div class="card">

<p>Regular Users</p>

<h2 id="regularUsers">
0
</h2>

</div>

</div>

<div class="table-card">

<h2 style="margin-bottom:20px;">
Registered Users
</h2>

<div style="overflow-x:auto;">

<table class="orders-modern-table">

<thead>

<tr>

<th>PROFILE</th>
<th>NAME</th>
<th>EMAIL</th>
<th>PHONE</th>
<th>ROLE</th>
<th>JOINED</th>
<th>ACTION</th>

</tr>

</thead>

<tbody id="usersTable">

</tbody>

</table>

</div>

</div>

</div>

<script>

async function loadUsers(){

try{

const response =
await fetch("/api/users");

const users =
await response.json();

const table =
document.getElementById("usersTable");

const searchValue =
document.getElementById("searchUsers")
.value
.toLowerCase();

table.innerHTML = "";

document.getElementById("totalUsers")
.textContent = users.length;

const adminCount =
users.filter(user => user.role === "admin").length;

document.getElementById("adminUsers")
.textContent = adminCount;

document.getElementById("regularUsers")
.textContent =
users.length - adminCount;

users
.filter(user =>

(user.name || "")
.toLowerCase()
.includes(searchValue)

||

(user.email || "")
.toLowerCase()
.includes(searchValue)

)
.forEach(user=>{

table.innerHTML += `

<tr>

<td>

<img
src="${
user.profileImage ||
'https://via.placeholder.com/60'
}"
class="profile-img"
>

</td>

<td>
${user.name}
</td>

<td>
${user.email}
</td>

<td>
${user.phone || "No Phone"}
</td>

<td>

<span class="
role-badge
${user.role === 'admin'
? 'role-admin'
: 'role-user'}
">

${user.role}

</span>

</td>

<td>

${new Date(user.createdAt)
.toLocaleDateString()}

</td>

<td>

<button
class="delete-btn"
onclick="deleteUser('${user._id}')"
>

Delete

</button>

</td>

</tr>

`;

});

}catch(err){

console.log(err);

}

}

async function deleteUser(id){

const confirmDelete =
confirm("Delete this user?");

if(!confirmDelete) return;

try{

await fetch("/api/users/" + id,{
method:"DELETE"
});

loadUsers();

}catch(err){

console.log(err);

}

}

document
.getElementById("searchUsers")
.addEventListener("input",loadUsers);

loadUsers();

</script>

</body>
</html>
